name: 🚀 Complete CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:  # Manual trigger for testing

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}
  GITOPS_REPO: "AhmadPK786/otel-demo-gitops-config"  # ← CORRECTED

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout Source Code
      uses: actions/checkout@v4

    - name: 🔐 Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: 🎨 Build & Push Frontend
      run: |
        echo "Building frontend with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/frontend:$IMAGE_TAG ./src/frontend
        docker tag $DOCKERHUB_USERNAME/projectimages/frontend:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/frontend:latest
        docker push $DOCKERHUB_USERNAME/projectimages/frontend:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/frontend:latest
        echo "✅ Frontend done"

    - name: 🛒 Build & Push Cart
      run: |
        echo "Building cart with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/cart:$IMAGE_TAG ./src/cart/src
        docker tag $DOCKERHUB_USERNAME/projectimages/cart:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/cart:latest
        docker push $DOCKERHUB_USERNAME/projectimages/cart:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/cart:latest
        echo "✅ Cart done"

    - name: 💳 Build & Push Payment
      run: |
        echo "Building payment with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/payment:$IMAGE_TAG ./src/payment
        docker tag $DOCKERHUB_USERNAME/projectimages/payment:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/payment:latest
        docker push $DOCKERHUB_USERNAME/projectimages/payment:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/payment:latest
        echo "✅ Payment done"

    - name: 📦 Build & Push Product-Catalog
      run: |
        echo "Building product-catalog with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/product-catalog:$IMAGE_TAG ./src/product-catalog
        docker tag $DOCKERHUB_USERNAME/projectimages/product-catalog:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/product-catalog:latest
        docker push $DOCKERHUB_USERNAME/projectimages/product-catalog:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/product-catalog:latest
        echo "✅ Product-Catalog done"

    - name: 🛍️ Build & Push Checkout
      run: |
        echo "Building checkout with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/checkout:$IMAGE_TAG ./src/checkout
        docker tag $DOCKERHUB_USERNAME/projectimages/checkout:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/checkout:latest
        docker push $DOCKERHUB_USERNAME/projectimages/checkout:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/checkout:latest
        echo "✅ Checkout done"

    - name: ⭐ Build & Push Recommendation
      run: |
        echo "Building recommendation with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/recommendation:$IMAGE_TAG ./src/recommendation
        docker tag $DOCKERHUB_USERNAME/projectimages/recommendation:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/recommendation:latest
        docker push $DOCKERHUB_USERNAME/projectimages/recommendation:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/recommendation:latest
        echo "✅ Recommendation done"

    - name: 🚚 Build & Push Shipping
      run: |
        echo "Building shipping with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/shipping:$IMAGE_TAG ./src/shipping
        docker tag $DOCKERHUB_USERNAME/projectimages/shipping:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/shipping:latest
        docker push $DOCKERHUB_USERNAME/projectimages/shipping:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/shipping:latest
        echo "✅ Shipping done"

    - name: 📧 Build & Push Email
      run: |
        echo "Building email with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/email:$IMAGE_TAG ./src/email
        docker tag $DOCKERHUB_USERNAME/projectimages/email:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/email:latest
        docker push $DOCKERHUB_USERNAME/projectimages/email:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/email:latest
        echo "✅ Email done"

    - name: 💱 Build & Push Currency
      run: |
        echo "Building currency with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/currency:$IMAGE_TAG ./src/currency
        docker tag $DOCKERHUB_USERNAME/projectimages/currency:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/currency:latest
        docker push $DOCKERHUB_USERNAME/projectimages/currency:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/currency:latest
        echo "✅ Currency done"

    - name: 📢 Build & Push Ad
      run: |
        echo "Building ad with tag: $IMAGE_TAG"
        docker build -t $DOCKERHUB_USERNAME/projectimages/ad:$IMAGE_TAG ./src/ad
        docker tag $DOCKERHUB_USERNAME/projectimages/ad:$IMAGE_TAG $DOCKERHUB_USERNAME/projectimages/ad:latest
        docker push $DOCKERHUB_USERNAME/projectimages/ad:$IMAGE_TAG
        docker push $DOCKERHUB_USERNAME/projectimages/ad:latest
        echo "✅ Ad done"

  update-gitops:
    needs: build-and-push
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Clone GitOps Repository
      run: |
        echo "Cloning GitOps repo..."
        git clone https://${{ secrets.GITOPS_REPO_TOKEN }}@github.com/${{ env.GITOPS_REPO }}.git gitops-repo
        cd gitops-repo
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        echo "✅ GitOps repo cloned"

    - name: 🔄 Update Kubernetes Manifests
      run: |
        cd gitops-repo
        
        # Create directory if not exists
        mkdir -p app
        
        # Create fresh manifest file with namespace
        cat > app/opentelemetry-demo.yaml << 'YAML'
        apiVersion: v1
        kind: Namespace
        metadata:
          name: opentelemetry-demo
        ---
        YAML
        
        # Update image tags using sed
        SHORT_TAG=${IMAGE_TAG:0:7}
        
        # Function to update or add deployment
        update_deployment() {
          local service=$1
          local port=$2
          
          # Add deployment
          cat >> app/opentelemetry-demo.yaml << DEPLOYMENT
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: $service
          namespace: opentelemetry-demo
          labels:
            app: $service
            version: $SHORT_TAG
        spec:
          replicas: 1
          selector:
            matchLabels:
              app: $service
          template:
            metadata:
              labels:
                app: $service
                version: $SHORT_TAG
            spec:
              containers:
              - name: $service
                image: $DOCKERHUB_USERNAME/projectimages/$service:$IMAGE_TAG
                imagePullPolicy: Always
                ports:
                - containerPort: $port
                env:
                - name: OTEL_SERVICE_NAME
                  value: "$service"
                - name: OTEL_EXPORTER_OTLP_ENDPOINT
                  value: "http://otel-collector:4317"
                resources:
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                  limits:
                    memory: "256Mi"
                    cpu: "200m"
        ---
        apiVersion: v1
        kind: Service
        metadata:
          name: $service
          namespace: opentelemetry-demo
        spec:
          selector:
            app: $service
          ports:
          - port: $port
            targetPort: $port
          type: ClusterIP
        ---
        DEPLOYMENT
        }
        
        # Update all services
        update_deployment "frontend" "3000"
        update_deployment "cart" "8080"
        update_deployment "payment" "8080"
        update_deployment "product-catalog" "8080"
        update_deployment "checkout" "8080"
        update_deployment "recommendation" "8080"
        update_deployment "shipping" "8080"
        update_deployment "email" "8080"
        update_deployment "currency" "8080"
        update_deployment "ad" "8080"
        
        echo "✅ All manifests updated with tag: $SHORT_TAG"

    - name: 📤 Commit and Push Changes
      run: |
        cd gitops-repo
        git add app/opentelemetry-demo.yaml
        git commit -m "🚀 Deploy version ${IMAGE_TAG:0:7}" || echo "No changes to commit"
        git push origin main
        echo "✅ Changes pushed to GitOps repo"
